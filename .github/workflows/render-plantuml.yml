name: Render PlantUML diagrams

on:
  push:
    paths:
      - "diagrams/**/*.puml"
      - ".github/workflows/render-plantuml.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Render PlantUML to SVG
        uses: cloudbees/plantuml-github-action@v1.0.1
        with:
          args: -tsvg diagrams/*.puml

      - name: Commit rendered SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diagrams/*.svg
          git commit -m "Update rendered PlantUML diagrams" || exit 0
          git push
